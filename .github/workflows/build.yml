name: Build and Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.5.3'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        cache: true
        setup-python: false
        install-deps: false

    - name: Install OpenSSL
      run: |
        choco install openssl -y
        echo "OPENSSL_ROOT_DIR=C:\Program Files\OpenSSL-Win64" >> $env:GITHUB_ENV

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. -G "Visual Studio 16 2019" -A x64 -DOPENSSL_ROOT_DIR="C:\Program Files\OpenSSL-Win64" -DCMAKE_PREFIX_PATH="$env:Qt6_DIR"

    - name: Build
      run: |
        cd build
        cmake --build . --config Release --parallel

    - name: Package Qt dependencies
      run: |
        cd build/bin/Release
        windeployqt AppManager.exe --release --no-translations

    - name: Create archive
      run: |
        cd build/bin/Release
        7z a -tzip ../../AppManager-Windows-x64.zip *

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: AppManager-Windows-x64
        path: build/AppManager-Windows-x64.zip
        retention-days: 30

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: build/AppManager-Windows-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
