name: Build and Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.6.0'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2022_64'
        modules: 'qtnetworkauth'

    - name: Install OpenSSL
      run: |
        choco install openssl -y
        echo "OPENSSL_ROOT_DIR=C:\Program Files\OpenSSL-Win64" >> $env:GITHUB_ENV

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64 -DOPENSSL_ROOT_DIR="C:\Program Files\OpenSSL-Win64"

    - name: Build
      run: |
        cd build
        cmake --build . --config Release

    - name: Package Qt dependencies
      run: |
        cd build/bin/Release
        windeployqt AppManager.exe

    - name: Create archive
      run: |
        cd build/bin/Release
        7z a -tzip ../../AppManager-Windows-x64.zip *

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: AppManager-Windows-x64
        path: build/AppManager-Windows-x64.zip
